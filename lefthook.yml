# https://lefthook.dev
# Pre-commit hooks for AI Code Reviewer

pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json}"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    ruff:
      glob: "*.py"
      run: cd apps/indexer && uv run ruff check --fix {staged_files} && uv run ruff format {staged_files}
      stage_fixed: true
    typecheck:
      glob: "*.{ts,tsx}"
      run: pnpm typecheck
    gitleaks:
      run: gitleaks protect --staged --no-banner --redact
      skip:
        - merge
        - rebase

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}
